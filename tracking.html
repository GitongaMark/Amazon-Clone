<!DOCTYPE html>
<html>
  <head>
    <title>Tracking</title>

    <!-- This code is needed for responsive design to work. -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Load a font called Roboto from Google Fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Here are the CSS files for this page. -->
    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/shared/amazon-header.css">
    <link rel="stylesheet" href="styles/pages/tracking.css">
  </head>
  <body>
    <div class="amazon-header">
      <div class="amazon-header-left-section">
        <a href="amazon.html" class="header-link">
          <img class="amazon-logo" src="images/amazon-logo-white.png" alt="Amazon Logo">
          <img class="amazon-mobile-logo" src="images/amazon-mobile-logo-white.png" alt="Amazon Mobile Logo">
        </a>
      </div>

      <div class="amazon-header-middle-section">
        <input class="search-bar" type="text" placeholder="Search">
        <button class="search-button">
          <img class="search-icon" src="images/icons/search-icon.png" alt="Search Icon">
        </button>
      </div>

      <div class="amazon-header-right-section">
        <a class="orders-link header-link" href="orders.html">
          <span class="returns-text">Returns</span>
          <span class="orders-text">& Orders</span>
        </a>

        <a class="cart-link header-link" href="checkout.html">
          <img class="cart-icon" src="images/icons/cart-icon.png" alt="Cart Icon">
          <div class="cart-quantity" id="cart-quantity">0</div>
          <div class="cart-text">Cart</div>
        </a>
      </div>
    </div>

    <div class="main">
      <div class="order-tracking">
        <!-- Link to view all orders -->
        <a class="back-to-orders-link link-primary" href="templates/orders.html">
          View all orders
        </a>

        <!-- Delivery date info -->
        <div class="delivery-date" id="delivery-date">
          Arriving on [Delivery Date]
        </div>

        <!-- Product info -->
        <div class="product-info" id="product-info">
          [Product Name]
        </div>

        <div class="product-info" id="quantity-info">
          Quantity: [Quantity]
        </div>

        <img class="product-image" id="product-image" src="" alt="Product Image">

        <!-- Progress status -->
        <div class="progress-labels-container">
          <div class="progress-label">
            Preparing
          </div>
          <div class="progress-label current-status">
            Shipped
          </div>
          <div class="progress-label">
            Delivered
          </div>
        </div>

        <!-- Progress bar -->
        <div class="progress-bar-container">
          <div class="progress-bar"></div>
        </div>
      </div>
    </div>

    <script>
      // Fetch cart item count from localStorage (or any other storage)
      const cartItems = JSON.parse(localStorage.getItem('cart')) || [];
      const cartQuantityElement = document.getElementById('cart-quantity');
      cartQuantityElement.innerText = cartItems.length; // Update cart quantity in header

      // Fetch order tracking information (you could replace this with actual dynamic data from checkout)
      const urlParams = new URLSearchParams(window.location.search);
      const orderId = urlParams.get('orderId');

      // Simulate fetching order details from localStorage or an API based on the orderId
      const orderDetails = JSON.parse(localStorage.getItem('orders')) || {}; // You should replace with actual data fetching

      const order = orderDetails[orderId];

      if (order) {
        document.getElementById('delivery-date').innerText = `Arriving on ${order.deliveryDate}`;
        document.getElementById('product-info').innerText = order.productName;
        document.getElementById('quantity-info').innerText = `Quantity: ${order.quantity}`;
        document.getElementById('product-image').src = order.productImage;
      } else {
        // Handle case where order is not found
        alert('Order not found!');
      }
    </script>
  </body>
</html>
